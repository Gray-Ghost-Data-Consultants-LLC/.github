# Reusable CI workflow
# Usage:
#   jobs:
#     ci:
#       uses: Gray-Ghost-Data-Consultants-LLC/.github/.github/workflows/reusable-ci.yml@main
#       with:
#         node-version: '20'
#         turbo-filter: '@myorg/service'
#       secrets: inherit

name: Reusable CI

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "20"
      turbo-filter:
        description: "Turborepo filter expression (e.g. '@grayghostdata/portal'). Omit for all."
        type: string
        default: ""
      run-lint:
        description: "Run lint step"
        type: boolean
        default: true
      run-typecheck:
        description: "Run TypeScript type-check step"
        type: boolean
        default: true
      run-build:
        description: "Run build step"
        type: boolean
        default: true
      run-test:
        description: "Run unit tests"
        type: boolean
        default: false
      working-directory:
        description: "Working directory (for non-monorepo projects)"
        type: string
        default: "."
    secrets:
      CLERK_PUBLISHABLE_KEY:
        required: false
      NPM_TOKEN:
        required: false

jobs:
  lint:
    name: Lint
    if: ${{ inputs.run-lint }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Lint
        run: |
          FILTER="${{ inputs.turbo-filter }}"
          if [ -n "$FILTER" ]; then
            npx turbo run lint --filter="$FILTER"
          else
            npm run lint
          fi

  type-check:
    name: Type Check
    if: ${{ inputs.run-typecheck }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Type check
        run: |
          FILTER="${{ inputs.turbo-filter }}"
          if [ -n "$FILTER" ]; then
            npx turbo run type-check --filter="$FILTER"
          else
            npx tsc --noEmit
          fi

  build:
    name: Build
    # Run even if lint/typecheck were skipped (skipped ≠ failed)
    if: ${{ inputs.run-build && !failure() }}
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: |
          FILTER="${{ inputs.turbo-filter }}"
          if [ -n "$FILTER" ]; then
            npx turbo run build --filter="$FILTER"
          else
            npm run build
          fi
        env:
          CI: "true"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

  test:
    name: Unit Tests
    if: ${{ inputs.run-test }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Run tests
        run: |
          FILTER="${{ inputs.turbo-filter }}"
          if [ -n "$FILTER" ]; then
            npx turbo run test --filter="$FILTER"
          else
            npm test -- --ci --coverage
          fi
